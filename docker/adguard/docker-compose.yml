services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguard
    hostname: adguard
    restart: unless-stopped
    volumes:
      - ./workdir:/opt/adguardhome/work
      - ./confdir:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # - "3000:3000/tcp" 
    networks:
      - reverse-proxy # Deve essere la stessa rete di Nginx Proxy Manager

networks:
  reverse-proxy:
    external: true
