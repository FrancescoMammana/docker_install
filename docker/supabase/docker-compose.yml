version: '3.8'

services:
  supabase-db:
    image: supabase/postgres:15.1
    container_name: supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Configurazione sicurezza avanzata
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - supabase_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - reverse-proxy
    # Limitazioni di sicurezza
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

  supabase-kong:
    image: kong:2.8
    container_name: supabase-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      # Configurazione sicurezza
      KONG_PLUGINS: "bundled,cors"
      KONG_CORS_ORIGIN: "*"
      KONG_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      KONG_CORS_HEADERS: "Accept,Accept-Version,Content-Length,Content-MD5,Content-Type,Date,Authorization"
      KONG_CORS_EXPOSE_HEADERS: "X-Auth-Token,X-Request-Id"
      KONG_CORS_CREDENTIALS: "true"
    volumes:
      - ./docker/supabase/kong.yml:/var/lib/kong/kong.yml
      - ./docker/supabase/kong-ssl.yml:/var/lib/kong/kong-ssl.yml
    ports:
      - "19132:3000"  # Studio
      - "19133:8000"  # API Gateway
    depends_on:
      - supabase-db
    networks:
      - reverse-proxy
    # Limitazioni di sicurezza
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

  supabase-studio:
    image: supabase/studio:latest
    container_name: supabase-studio
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://supabase-kong:8000
      STUDIO_PG_PORT: 5432
      # Configurazione sicurezza
      STUDIO_API_URL: http://supabase-kong:8000
      STUDIO_STUDIO_URL: http://supabase-kong:3000
    depends_on:
      - supabase-kong
    networks:
      - reverse-proxy
    # Limitazioni di sicurezza
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

volumes:
  supabase_db:
  supabase_storage:

networks:
  reverse-proxy:
    external: true